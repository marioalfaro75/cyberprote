# Cloud Security Fabric — Collector Pipeline Configuration
# Auto-generated by CSF API. Edit via the Settings UI.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 256
    timeout: 5s

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  ocsftransform:
    enrich_epss: false
    enrich_kev: false
    csf_extensions: true

exporters:
  agegraph:
    dsn: "postgres://csf:csf-dev-password@localhost:5432/csf?sslmode=disable"
    graph_name: security_fabric
    batch_size: 100
    flush_interval: 10s

  debug:
    verbosity: basic

extensions:
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [zpages]
  pipelines:
    logs/security:
      receivers: [otlp]
      processors: [memory_limiter, batch, ocsftransform]
      exporters: [agegraph, debug]
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
