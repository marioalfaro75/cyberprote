apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "csf.fullname" . }}-postgresql
  labels:
    {{- include "csf.componentFullLabels" (dict "component" "postgresql" "context" .) | nindent 4 }}
spec:
  serviceName: {{ include "csf.fullname" . }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      {{- include "csf.componentLabels" (dict "component" "postgresql" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "csf.componentLabels" (dict "component" "postgresql" "context" .) | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: postgresql
              containerPort: {{ .Values.postgresql.port }}
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.credentials.database }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.credentials.username }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresql.credentials.password }}
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresql.credentials.username }}
                - -d
                - {{ .Values.postgresql.credentials.database }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresql.credentials.username }}
                - -d
                - {{ .Values.postgresql.credentials.database }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
      {{- with .Values.postgresql.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgresql.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgresql.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.postgresql.storageClassName }}
        storageClassName: {{ .Values.postgresql.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.storage }}
