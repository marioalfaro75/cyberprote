# Cloud Security Fabric — Helm Values
# Override these values per environment.

global:
  namespace: csf
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

# ---------------------------------------------------------------------------
# Collector — custom OpenTelemetry collector
# ---------------------------------------------------------------------------
collector:
  image:
    repository: csf-collector
    tag: latest
    pullPolicy: "{{ .Values.global.imagePullPolicy }}"
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ports:
    otlpGrpc: 4317
    otlpHttp: 4318
    health: 13133
    zpages: 55679
    metrics: 8888
  livenessProbe:
    httpGet:
      path: /
      port: health
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /
      port: health
    initialDelaySeconds: 5
    periodSeconds: 10
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# API Server
# ---------------------------------------------------------------------------
api:
  image:
    repository: csf-api
    tag: latest
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Dashboard — React app served via nginx
# ---------------------------------------------------------------------------
dashboard:
  image:
    repository: csf-dashboard
    tag: latest
  replicas: 1
  port: 80
  serviceType: ClusterIP          # Set to LoadBalancer for external access
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 3
    periodSeconds: 10
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# PostgreSQL + Apache AGE graph extension
# ---------------------------------------------------------------------------
postgresql:
  image:
    repository: apache/age
    tag: v1.5.0-pg16
  storage: 10Gi
  storageClassName: ""            # Empty string = cluster default
  port: 5432
  credentials:
    database: csf
    username: csf
    password: csf-dev-password    # Override in production!
    graphName: security_fabric
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
