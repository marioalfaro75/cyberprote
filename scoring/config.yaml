# Risk Scoring Weights Configuration
# All weights should sum to 1.0

severity: 0.20      # OCSF severity_id
cvss: 0.20          # CVSS base score
epss: 0.15          # EPSS probability score
exposure: 0.15      # Is the resource publicly exposed?
privilege: 0.10     # Does the finding involve admin-equivalent access?
asset_value: 0.10   # Asset criticality (1-5)
kev_bonus: 0.05     # Is the CVE in CISA KEV catalog?
toxic_combo: 0.05   # Number of toxic combinations
